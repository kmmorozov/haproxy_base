# Схема:
#   +-------------+     +------------------+     +-----------------------+
#   | HTTP client | --> | fe_http:8080     | --> | backend be_app        |
#   +-------------+     +------------------+     +-----------------------+
#                                                         |--> +----------------------+
#                                                         |    | app1 127.0.0.1:9001 |
#                                                         |    +----------------------+
#                                                         `--> +----------------------+
#                                                              | app2 127.0.0.1:9002 |
#                                                              +----------------------+
#
#   +---------+     +----------------+     +--------+
#   | Browser | --> | fe_stats:8404  | --> | /stats |
#   +---------+     +----------------+     +--------+
#
#   +------------+     +----------------------+     +----------+
#   | Prometheus | --> | fe_prometheus:8405   | --> | /metrics |
#   +------------+     +----------------------+     +----------+
#
# Глобальные параметры процесса, логов и runtime API.
global
    # Пишет логи в stdout на уровне info.
    log stdout format raw local0 info
    # Ограничивает общее число соединений.
    maxconn 2000
    # Создает runtime socket с административным уровнем доступа.
    stats socket /tmp/haproxy-admin.sock mode 660 level admin expose-fd listeners
    # Задает таймаут runtime API.
    stats timeout 30s

# Общие HTTP-параметры.
defaults
    # Использует log target из global.
    log global
    # Включает HTTP-режим.
    mode http
    # Включает HTTP-логи.
    option httplog
    # Не логирует пустые соединения.
    option dontlognull
    # Таймаут подключения к backend.
    timeout connect 5s
    # Таймаут клиента.
    timeout client 30s
    # Таймаут backend-сервера.
    timeout server 30s

# Основной HTTP frontend.
frontend fe_http
    # Принимает HTTP-запросы на 8080.
    bind *:8080
    # Захватывает Host header в лог.
    capture request header Host len 64
    # Захватывает User-Agent header в лог.
    capture request header User-Agent len 128
    # Передает запросы в backend приложения.
    default_backend be_app

# Backend приложения с health checks.
backend be_app
    # Распределяет запросы по очереди.
    balance roundrobin
    # Включает HTTP health check.
    option httpchk
    # Проверяет GET /healthz с Host header.
    http-check send meth GET uri /healthz ver HTTP/1.1 hdr Host app.local
    # Требует HTTP 200 для статуса UP.
    http-check expect status 200
    # Первый backend-сервер.
    server app1 127.0.0.1:9001 check
    # Второй backend-сервер.
    server app2 127.0.0.1:9002 check

# Stats dashboard.
frontend fe_stats
    # Принимает HTTP-запросы stats dashboard.
    bind *:8404
    # Включает HTTP-режим.
    mode http
    # Активирует встроенный stats UI.
    stats enable
    # Публикует stats UI по /stats.
    stats uri /stats
    # Обновляет страницу каждые 10 секунд.
    stats refresh 10s
    # Защищает stats UI basic auth.
    stats auth admin:change_me

# Prometheus exporter.
frontend fe_prometheus
    # Принимает scrape-запросы Prometheus.
    bind *:8405
    # Включает HTTP-режим.
    mode http
    # Отдает встроенные метрики только по /metrics.
    http-request use-service prometheus-exporter if { path /metrics }
    # Отключает access logs для scrape endpoint.
    no log

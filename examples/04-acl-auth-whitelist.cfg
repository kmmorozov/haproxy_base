# Схема:
#   +---------------+
#   |  HTTP client  |
#   +---------------+
#           |
#           v
#   +-----------------------+
#   | HAProxy fe_http:8080  |
#   +-----------------------+
#      |-- /static or /assets ----------> +-----------------------+
#      |                                  | backend be_static     |
#      |                                  +-----------------------+
#      |                                      |--> +-------------------------+
#      |                                      |    | static1 127.0.0.1:9011 |
#      |                                      |    +-------------------------+
#      |                                      `--> +-------------------------+
#      |                                           | static2 127.0.0.1:9012 |
#      |                                           +-------------------------+
#      |
#      `-- default ---------------------> +-----------------------+
#                                         | backend be_app        |
#                                         +-----------------------+
#                                             |--> +----------------------+
#                                             |    | app1 127.0.0.1:9001 |
#                                             |    +----------------------+
#                                             `--> +----------------------+
#                                                  | app2 127.0.0.1:9002 |
#                                                  +----------------------+
#
# Глобальные параметры процесса HAProxy.
global
    # Пишет логи в stdout.
    log stdout format raw local0
    # Ограничивает общее число соединений.
    maxconn 2000

# Общие HTTP-параметры.
defaults
    # Использует log target из global.
    log global
    # Включает HTTP-режим для ACL по path/header/method.
    mode http
    # Включает HTTP-формат логов.
    option httplog
    # Таймаут подключения к backend.
    timeout connect 5s
    # Таймаут клиента.
    timeout client 30s
    # Таймаут backend-сервера.
    timeout server 30s

# Пользователи basic auth.
userlist admins
    # Тестовая учетная запись; для production используйте хешированный пароль.
    user admin insecure-password admin123

# Основной HTTP frontend.
frontend fe_http
    # Принимает HTTP-запросы на порту 8080.
    bind *:8080

    # Определяет административные URL.
    acl admin_path path_beg /admin
    # Определяет доверенные адреса для доступа к /admin.
    acl trusted_src src 127.0.0.1 10.0.0.0/8 192.168.0.0/16
    # Определяет статические URL.
    acl static_path path_beg /static /assets

    # Возвращает 403 при обращении к /admin вне whitelist.
    http-request deny deny_status 403 if admin_path !trusted_src
    # Запрашивает basic auth для /admin, если пользователь не авторизован.
    http-request auth realm AdminArea if admin_path !{ http_auth(admins) }
    # Передает исходную схему в backend.
    http-request set-header X-Forwarded-Proto http
    # Передает IP клиента в backend.
    http-request set-header X-Real-IP %[src]
    # Добавляет защитный response header.
    http-response set-header X-Frame-Options DENY

    # Отправляет static/assets в отдельный backend.
    use_backend be_static if static_path
    # Все прочие запросы идут в приложение.
    default_backend be_app

# Backend приложения.
backend be_app
    # Распределяет запросы по очереди.
    balance roundrobin
    # Первый сервер приложения.
    server app1 127.0.0.1:9001 check
    # Второй сервер приложения.
    server app2 127.0.0.1:9002 check

# Backend статического контента.
backend be_static
    # Распределяет запросы по очереди.
    balance roundrobin
    # Первый static-сервер.
    server static1 127.0.0.1:9011 check
    # Второй static-сервер.
    server static2 127.0.0.1:9012 check

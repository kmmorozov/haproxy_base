# Схема:
#   +----------+
#   |  Client  |
#   +----------+
#        |
#        v
#   +-----------------------+
#   | HAProxy fe_http:8080  |
#   +-----------------------+
#        |
#        v
#   +-----------------------+
#   | backend be_web        |
#   +-----------------------+
#        |--------------------> +-----------------------+
#        |                     | web1 127.0.0.1:9001  |
#        |                     +-----------------------+
#        |
#        `--------------------> +-----------------------+
#                              | web2 127.0.0.1:9002  |
#                              +-----------------------+
#
# Глобальные параметры процесса HAProxy.
global
    # Пишет логи в stdout в простом raw-формате.
    log stdout format raw local0
    # Ограничивает общее число одновременных соединений.
    maxconn 2000

# Общие параметры для frontend/backend/listen ниже.
defaults
    # Использует log target из секции global.
    log global
    # Включает HTTP-режим и L7-анализ запросов.
    mode http
    # Включает HTTP-формат логов.
    option httplog
    # Не логирует пустые соединения без запросов.
    option dontlognull
    # Таймаут подключения к backend-серверу.
    timeout connect 5s
    # Таймаут простоя клиентского соединения.
    timeout client 30s
    # Таймаут простоя соединения с backend.
    timeout server 30s

# Frontend принимает клиентский HTTP-трафик.
frontend fe_http
    # Слушает порт 8080 на всех IPv4-интерфейсах.
    bind *:8080
    # Направляет все запросы в backend be_web.
    default_backend be_web

# Backend содержит пул web-серверов.
backend be_web
    # Распределяет запросы по серверам по очереди.
    balance roundrobin
    # Первый backend-сервер с активной проверкой доступности.
    server web1 127.0.0.1:9001 check
    # Второй backend-сервер с активной проверкой доступности.
    server web2 127.0.0.1:9002 check

# Схема:
#   +---------------+
#   |  HTTP client  |
#   +---------------+
#           |
#           v
#   +----------------------+
#   | HAProxy fe_api:8080  |
#   +----------------------+
#           |
#           | default_backend be_api
#           v
#   +--------------------------------------+
#   | backend be_api                      |
#   +--------------------------------------+
#           |---------------> +-----------------------+
#           |                | api1 127.0.0.1:9001  |
#           |                +-----------------------+
#           |
#           `---------------> +-----------------------+
#                            | api2 127.0.0.1:9002  |
#                            +-----------------------+
#
# Глобальные параметры процесса HAProxy.
global
    # Пишет логи в stdout.
    log stdout format raw local0
    # Ограничивает общее число соединений.
    maxconn 2000

# Общие HTTP-параметры.
defaults
    # Использует log target из global.
    log global
    # Включает HTTP-режим.
    mode http
    # Включает HTTP-логи.
    option httplog
    # Таймаут подключения к backend.
    timeout connect 5s
    # Таймаут клиента.
    timeout client 30s
    # Таймаут backend-сервера.
    timeout server 30s

# Frontend API.
frontend fe_api
    # Принимает HTTP-запросы на порту 8080.
    bind *:8080
    # Направляет запросы в API backend.
    default_backend be_api

# Backend API с HTTP health checks.
backend be_api
    # Распределяет запросы по очереди.
    balance roundrobin
    # Включает HTTP health check.
    option httpchk
    # Отправляет GET /healthz с HTTP/1.1 и Host header.
    http-check send meth GET uri /healthz ver HTTP/1.1 hdr Host api.local
    # Считает сервер здоровым только при статусе 200.
    http-check expect status 200
    # Задает интервалы и пороги проверок для всех server ниже:
    # inter 2s — обычная проверка каждые 2 секунды, пока состояние стабильное.
    # fastinter 500ms — ускоренные проверки при переходе UP->DOWN или DOWN->UP.
    # downinter 10s — редкие проверки, когда сервер уже признан DOWN.
    # fall 3 — DOWN после 3 ошибок подряд.
    # rise 2 — UP после 2 успешных проверок подряд.
    default-server inter 2s fastinter 500ms downinter 10s fall 3 rise 2
    # Первый API server с наследованием default-server.
    server api1 127.0.0.1:9001 check
    # Второй API server с наследованием default-server.
    server api2 127.0.0.1:9002 check

# Схема:
#   +---------------+
#   |  HTTP client  |
#   +---------------+
#           |
#           v
#   +-----------------------+
#   | HAProxy fe_http:8080  |
#   +-----------------------+
#      |--------------------> +--------------------------+
#      |                     | cache short_cache        |
#      |                     +--------------------------+
#      |
#      `--------------------------> +--------------------------+
#                                   | backend be_app           |
#                                   | sticky cookie: SRV       |
#                                   +--------------------------+
#                                      |--> +-----------------------------+
#                                      |    | app1 127.0.0.1:9001        |
#                                      |    | cookie value: app1         |
#                                      |    +-----------------------------+
#                                      `--> +-----------------------------+
#                                           | app2 127.0.0.1:9002        |
#                                           | cookie value: app2         |
#                                           +-----------------------------+
#
# Глобальные параметры процесса HAProxy.
global
    # Пишет логи в stdout.
    log stdout format raw local0
    # Ограничивает общее число соединений.
    maxconn 2000

# Область in-memory cache.
cache short_cache
    # Максимальный общий размер cache в MB.
    total-max-size 64
    # Максимальный размер одного объекта в bytes.
    max-object-size 1048576
    # Максимальный TTL объекта в секундах.
    max-age 60

# Общие HTTP-параметры.
defaults
    # Использует log target из global.
    log global
    # Включает HTTP-режим.
    mode http
    # Включает HTTP-формат логов.
    option httplog
    # Таймаут подключения к backend.
    timeout connect 5s
    # Таймаут клиента.
    timeout client 30s
    # Таймаут backend-сервера.
    timeout server 30s

# HTTP frontend с cache.
frontend fe_http
    # Принимает HTTP-запросы на порту 8080.
    bind *:8080
    # Подключает cache filter.
    filter cache short_cache

    # Разрешает cache только для публичных путей.
    acl cacheable path_beg /static /public /api/catalog
    # Пытается отдать cacheable-запрос из cache.
    http-request cache-use short_cache if cacheable
    # Сохраняет подходящие ответы в cache.
    http-response cache-store short_cache

    # Передает остальные запросы в backend приложения.
    default_backend be_app

# Backend приложения со sticky cookie.
backend be_app
    # Распределяет новых клиентов по очереди.
    balance roundrobin
    # Вставляет cookie SRV, скрывает ее от backend и запрещает кеширование Set-Cookie.
    cookie SRV insert indirect nocache
    # Первый сервер получает cookie-значение app1.
    server app1 127.0.0.1:9001 check cookie app1
    # Второй сервер получает cookie-значение app2.
    server app2 127.0.0.1:9002 check cookie app2

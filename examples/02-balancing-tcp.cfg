# Схема:
#   +--------------+
#   |  TCP client  |
#   +--------------+
#          |
#          v
#   +----------------------+
#   | HAProxy fe_tcp:9000  |
#   +----------------------+
#          |
#          v
#   +-------------------------------------+
#   | backend be_tcp_services            |
#   | algorithm: leastconn               |
#   +-------------------------------------+
#          |----------------> +-----------------------+
#          |                 | tcp1 127.0.0.1:9101  |
#          |                 +-----------------------+
#          |
#          `----------------> +-----------------------+
#                            | tcp2 127.0.0.1:9102  |
#                            +-----------------------+
#
# Глобальные параметры процесса HAProxy.
global
    # Пишет логи в stdout.
    log stdout format raw local0
    # Ограничивает общее число соединений.
    maxconn 2000

# Общие TCP-параметры.
defaults
    # Использует log target из global.
    log global
    # Включает L4 TCP-режим без HTTP-разбора.
    mode tcp
    # Включает TCP-формат логов.
    option tcplog
    # Таймаут подключения к backend.
    timeout connect 5s
    # Таймаут простоя клиента.
    timeout client 1m
    # Таймаут простоя backend-сервера.
    timeout server 1m

# TCP frontend.
frontend fe_tcp
    # Принимает TCP-соединения на порту 9000.
    bind *:9000
    # Передает все соединения в TCP backend.
    default_backend be_tcp_services

# TCP backend для долгих соединений.
backend be_tcp_services
    # Выбирает сервер с минимальным числом активных соединений.
    balance leastconn
    # Первый TCP-сервер; DOWN после 3 ошибок, UP после 2 успехов.
    server tcp1 127.0.0.1:9101 check inter 2s fall 3 rise 2
    # Второй TCP-сервер; DOWN после 3 ошибок, UP после 2 успехов.
    server tcp2 127.0.0.1:9102 check inter 2s fall 3 rise 2

# Альтернативы для анализа:
# balance roundrobin — равномерное распределение по очереди.
# balance source — affinity по source IP.
# hash-type consistent — консистентное хеширование для меньшего перераспределения.

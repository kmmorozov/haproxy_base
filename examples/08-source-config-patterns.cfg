# Схема:
#   +-----------------+     +----------+
#   | HTTP client :80 | --> | fe_https |
#   +-----------------+     +----------+
#
#   +-------------------+     +------------+     +--------------------+
#   | HTTPS client :443 | --> | fe_https   | --> | backend be_apache3 |
#   +-------------------+     +------------+     +--------------------+
#                                                        |--> +--------------------+
#                                                        |    | ap1 192.168.20.49 |
#                                                        |    +--------------------+
#                                                        |--> +--------------------+
#                                                        |    | ap3 192.168.20.48 |
#                                                        |    +--------------------+
#                                                        `--> +--------------------+
#                                                             | ap2 192.168.20.51 |
#                                                             +--------------------+
#
#   +-----------------+     +---------+     +--------------------+
#   | HTTP client :81 | --> | fe_auth | --> | backend be_apache3 |
#   +-----------------+     +---------+     +--------------------+
#
#   +-----------------+     +-----------------+
#   | HTTP client :82 | --> | fe_host_routing |
#   +-----------------+     +-----------------+
#                              |--> +-------------------+
#                              |    | backend be_apache |
#                              |    +-------------------+
#                              |--> +--------------------+
#                              |    | backend be_apache2 |
#                              |    +--------------------+
#                              `--> +--------------------+
#                                   | backend be_apache3 |
#                                   +--------------------+
#
#   +-----------------+     +--------------+     +--------------------+
#   | HTTP client :83 | --> | fe_blocklist | --> | backend be_apache2 |
#   +-----------------+     +--------------+     +--------------------+
#
#   +-------------------+     +----------+     +--------------------------+
#   | MySQL client:3306 | --> | fe_mysql | --> | backend be_mysql_servers |
#   +-------------------+     +----------+     +--------------------------+
#                                                   |--> +--------------------+
#                                                   |    | s1 192.168.20.49  |
#                                                   |    +--------------------+
#                                                   |--> +--------------------+
#                                                   |    | s2 192.168.20.48  |
#                                                   |    +--------------------+
#                                                   `--> +--------------------+
#                                                        | s3 192.168.20.51  |
#                                                        +--------------------+
#
#   +---------------+     +----------+     +--------+
#   | Browser :8404 | --> | fe_stats | --> | /stats |
#   +---------------+     +----------+     +--------+
#
# Глобальные параметры процесса.
global
    # Отправляет логи на syslog endpoint 127.0.0.1 facility local2.
    log 127.0.0.1 local2
    # Ограничивает файловую область процесса каталогом /var/lib/haproxy.
    chroot /var/lib/haproxy
    # Пишет PID основного процесса в файл.
    pidfile /var/run/haproxy.pid
    # Ограничивает общее число одновременных соединений.
    maxconn 4000
    # Сбрасывает привилегии до пользователя haproxy после старта.
    user haproxy
    # Сбрасывает группу процесса до haproxy после старта.
    group haproxy
    # Переводит процесс в daemon mode при запуске без systemd foreground.
    daemon
    # Создает Unix socket для stats/runtime API.
    stats socket /var/lib/haproxy/stats
    # Использует системный профиль шифров для TLS bind на RHEL-like системах.
    ssl-default-bind-ciphers PROFILE=SYSTEM
    # Использует системный профиль шифров для TLS-соединений к backend.
    ssl-default-server-ciphers PROFILE=SYSTEM

# Общие параметры HTTP-секций.
defaults
    # Включает HTTP-режим по умолчанию.
    mode http
    # Использует log target из global.
    log global
    # Включает HTTP-формат логов.
    option httplog
    # Не логирует пустые соединения.
    option dontlognull
    # Закрывает server-side HTTP-соединение после ответа и сохраняет client keep-alive.
    option http-server-close
    # Добавляет X-Forwarded-For, кроме клиентов из loopback-сети.
    option forwardfor except 127.0.0.0/8
    # При ошибке соединения разрешает повторно выбрать другой server.
    option redispatch
    # Задает число повторных попыток подключения.
    retries 3
    # Ограничивает время ожидания полного HTTP request.
    timeout http-request 10s
    # Ограничивает время ожидания в очереди backend.
    timeout queue 1m
    # Ограничивает время подключения к backend.
    timeout connect 10s
    # Ограничивает простой клиента.
    timeout client 1m
    # Ограничивает простой backend-сервера.
    timeout server 1m
    # Ограничивает простой keep-alive соединения.
    timeout http-keep-alive 10s
    # Ограничивает время выполнения health check.
    timeout check 10s
    # Ограничивает число соединений на proxy section.
    maxconn 3000

# Пользователи basic auth с открытым паролем.
userlist mycredentials
    # Пользователь с insecure-password; подходит только для тестовых стендов.
    user kirill insecure-password 1985
    # Второй пользователь с insecure-password.
    user nikolay insecure-password 2013

# Пользователи basic auth с хешированным паролем.
userlist mycredentials2
    # Пользователь с SHA-crypt хешем пароля.
    user anna password $5$NabWwyMwve.3Vmtx$BpdKLBmJo3K76/kXEPnffN/unaUeuoXLzdewvGycN45

# HTTP/HTTPS frontend с TLS termination.
frontend fe_https
    # Явно включает HTTP-режим.
    mode http
    # Принимает plain HTTP на порту 80.
    bind *:80
    # Принимает HTTPS на порту 443 и использует PEM-файл cert+key.
    bind *:443 ssl crt /etc/ssl/certs/xzxzxz.pem
    # Перенаправляет HTTP на HTTPS, если соединение не TLS.
    http-request redirect scheme https unless { ssl_fc }
    # Отправляет разрешенный трафик в backend apache3.
    default_backend be_apache3

# HTTP frontend с basic auth.
frontend fe_auth
    # Принимает HTTP-запросы на порту 81.
    bind *:81
    # Запрашивает basic auth, если пользователь не прошел http_auth.
    http-request auth unless { http_auth(mycredentials2) }
    # Отправляет авторизованные запросы в backend apache3.
    default_backend be_apache3

# Backend с демонстрацией алгоритмов из исходных конфигов.
backend be_apache
    # Альтернатива: balance roundrobin распределяет запросы по очереди.
    # balance roundrobin
    # Альтернатива: balance leastconn выбирает сервер с меньшим числом соединений.
    # balance leastconn
    # Альтернатива: balance first выбирает первый доступный сервер из списка.
    # balance first
    # Альтернатива: balance uri хеширует URI запроса.
    # balance uri
    # Альтернатива: balance source хеширует IP источника.
    # balance source
    # Альтернатива: balance url_param <name> хеширует query parameter.
    # balance url_param user_id
    # Хеширует значение HTTP header User-Agent для выбора сервера.
    balance hdr(User-Agent)
    # Первый сервер с интервалом check 500 ms, fall/rise и weight.
    server ap1 192.168.20.49:80 check inter 500 fall 10 rise 10 weight 10
    # Второй сервер с интервалом check 3000 ms.
    server ap3 192.168.20.48:80 check inter 3000 fall 10 rise 10 weight 10
    # Третий сервер с интервалом check 4000 ms.
    server ap2 192.168.20.51:80 check inter 4000 fall 10 rise 10 weight 10

# Backend с HTTP health check в старом стиле option httpchk.
backend be_apache2
    # Выполняет HTTP health check методом GET по URI /health/index.html.
    option httpchk GET /health/index.html
    # Распределяет запросы по очереди с учетом weight.
    balance roundrobin
    # Первый сервер с весом 90.
    server apache1 172.16.30.125:8080 weight 90 check
    # Второй сервер с весом 10.
    server apache2 172.16.30.136:8080 weight 10 check

# Backend с modern HTTP health check.
backend be_apache3
    # Включает HTTP health check.
    option httpchk
    # Отправляет GET /health на backend.
    http-check send meth GET uri /health
    # Требует HTTP 200 для статуса UP.
    http-check expect status 200
    # Первый backend-сервер.
    server ap1 192.168.20.49:80 check inter 500 fall 10 rise 10 weight 10
    # Второй backend-сервер.
    server ap3 192.168.20.48:80 check inter 3000 fall 10 rise 10 weight 10
    # Третий backend-сервер.
    server ap2 192.168.20.51:80 check inter 4000 fall 10 rise 10 weight 10

# TCP frontend для MySQL.
frontend fe_mysql
    # Включает TCP-режим.
    mode tcp
    # Принимает MySQL TCP-соединения на 3306.
    bind :3306
    # Передает соединения в TCP backend.
    default_backend be_mysql_servers

# TCP backend для MySQL.
backend be_mysql_servers
    # Включает TCP-режим.
    mode tcp
    # Распределяет TCP-соединения по очереди с учетом weight.
    balance roundrobin
    # Первый MySQL server с весом 1.
    server s1 192.168.20.49:3306 check inter 500 fall 10 rise 10 weight 1
    # Второй MySQL server с весом 5.
    server s2 192.168.20.48:3306 check inter 500 fall 10 rise 10 weight 5
    # Третий MySQL server с весом 10.
    server s3 192.168.20.51:3306 check inter 500 fall 10 rise 10 weight 10

# HTTP frontend с ACL по Host и path.
frontend fe_host_routing
    # Принимает HTTP-запросы на порту 82.
    bind *:82
    # Находит подстроку firefox в User-Agent без учета регистра.
    acl blocked_ua hdr_sub(user-agent) -i firefox
    # Проверяет Host www.test1.local.
    acl site1 hdr(host) -i www.test1.local
    # Проверяет Host www.test2.local.
    acl site2 hdr(host) -i www.test2.local
    # Проверяет Host www.test3.local.
    acl site3 hdr(host) -i www.test3.local
    # Проверяет, что path начинается с /static/.
    acl is_static path -i -m beg /static/
    # Блокирует запросы с запрещенным User-Agent.
    http-request deny if blocked_ua
    # Отправляет site1 в be_apache.
    use_backend be_apache if site1
    # Отправляет site2 в be_apache2.
    use_backend be_apache2 if site2
    # Отправляет site3 в be_apache3.
    use_backend be_apache3 if site3
    # Отправляет static path в be_apache3.
    use_backend be_apache3 if is_static
    # Остальные запросы идут в be_apache2.
    default_backend be_apache2

# HTTP frontend с blocklist из файла.
frontend fe_blocklist
    # Принимает HTTP-запросы на порту 83.
    bind *:83
    # Включает HTTP-режим.
    mode http
    # Загружает заблокированные IP/CIDR из внешнего файла.
    acl is_blocked_ip src -f /etc/haproxy/blocklisted.ips
    # Отказывает запросам от IP из blocklist.
    http-request deny if is_blocked_ip
    # Остальные запросы идут в be_apache2.
    default_backend be_apache2

# Stats dashboard с локальным admin mode.
frontend fe_stats
    # Включает HTTP-режим.
    mode http
    # Принимает stats-запросы на порту 8404.
    bind *:8404
    # Активирует stats UI.
    stats enable
    # Публикует stats UI по /stats.
    stats uri /stats
    # Обновляет stats UI каждые 10 секунд.
    stats refresh 10s
    # Разрешает admin actions только для predefined ACL LOCALHOST.
    stats admin if LOCALHOST

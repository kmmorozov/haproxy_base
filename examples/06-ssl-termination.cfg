# Схема:
#   +-------------------+
#   | HTTPS client :443 |
#   +-------------------+
#            |
#            v
#   +----------------------------------------------+
#   | HAProxy fe_https                            |
#   | TLS termination, certificate: site.pem       |
#   +----------------------------------------------+
#            |
#            | plain HTTP to backend
#            v
#   +-----------------------+
#   | backend be_app        |
#   +-----------------------+
#       |--> +----------------------+
#       |    | app1 127.0.0.1:9001 |
#       |    +----------------------+
#       `--> +----------------------+
#            | app2 127.0.0.1:9002 |
#            +----------------------+
#
# Глобальные параметры процесса и TLS.
global
    # Пишет логи в stdout.
    log stdout format raw local0
    # Ограничивает общее число соединений.
    maxconn 2000
    # Запрещает TLS ниже 1.2 и отключает TLS session tickets.
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    # Задает cipher suites для TLS 1.3.
    ssl-default-bind-ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256

# Общие HTTP-параметры.
defaults
    # Использует log target из global.
    log global
    # Включает HTTP-режим.
    mode http
    # Включает HTTP-логи.
    option httplog
    # Таймаут подключения к backend.
    timeout connect 5s
    # Таймаут клиента.
    timeout client 30s
    # Таймаут backend-сервера.
    timeout server 30s

# Frontend для HTTP и HTTPS.
frontend fe_https
    # Принимает plain HTTP на порту 80.
    bind *:80
    # Принимает HTTPS на 443 и использует PEM с сертификатом и private key.
    bind *:443 ssl crt /etc/haproxy/certs/site.pem alpn h2,http/1.1
    # Перенаправляет HTTP на HTTPS.
    http-request redirect scheme https code 301 unless { ssl_fc }
    # Добавляет HSTS только для TLS-запросов.
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains" if { ssl_fc }
    # Передает запросы в backend приложения.
    default_backend be_app

# Backend приложения.
backend be_app
    # Распределяет запросы по очереди.
    balance roundrobin
    # Первый backend-сервер.
    server app1 127.0.0.1:9001 check
    # Второй backend-сервер.
    server app2 127.0.0.1:9002 check

# Backend с TLS до application-серверов:
# backend be_secure_app
#     # Включает HTTP-режим.
#     mode http
#     # Подключается к backend по TLS и проверяет сертификат через CA-файл.
#     server app1 10.0.0.11:443 ssl verify required ca-file /etc/haproxy/ca.pem check
